[graph]
all-features = true

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
ignore = [
    # Unmaintained-crate advisories on transitive deps (not security vulns; no fixed version available).
    # bincode — pulled transitively; RUSTSEC-2025-0141 flags it as unmaintained.
    "RUSTSEC-2025-0141",
    # paste — proc-macro pulled transitively (via ML/candle stack); RUSTSEC-2024-0436 flags no-longer-maintained.
    "RUSTSEC-2024-0436",
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
]
confidence-threshold = 0.93

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Workspace-internal path deps (e.g. ruflo-kernel-napi/-wasm → `ruflo-kernel =
# { path = "../kernel" }`) carry no version and are otherwise flagged as
# wildcards. They are first-party crates in this same workspace, not unpinned
# registry deps, so allow them while still denying real registry wildcards.
allow-wildcard-paths = true
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
