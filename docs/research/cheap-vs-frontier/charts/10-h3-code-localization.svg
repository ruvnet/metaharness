<svg xmlns="http://www.w3.org/2000/svg" width="880" height="470" viewBox="0 0 880 470" font-family="system-ui,sans-serif"><rect width="880" height="470" fill="white"/><text x="60" y="28" font-family="system-ui,sans-serif" font-size="18" font-weight="700" fill="#111827">ADR-201 H3-code: cheap-model gold-file localization — dense cosine vs graph topology</text><text x="60" y="48" font-family="system-ui,sans-serif" font-size="11.5" fill="#6b7280">SWE-rebench Python repos n=29, K=8 candidate files/arm. dense=top-K cosine; graph=kHop+PageRank topology (NO cosine).</text><text x="60" y="64" font-family="system-ui,sans-serif" font-size="11.5" fill="#6b7280">gold-hit@3 = model's top-3 picks include the gold patch file. Whiskers = 95% Wilson CI. reasoning disabled, $0.0883.</text><line x1="60" y1="406" x2="630" y2="406" stroke="#374151" stroke-width="1.5"/><line x1="60" y1="406" x2="630" y2="406" stroke="#e5e7eb" stroke-width="1"/><text x="52" y="410" text-anchor="end" font-family="system-ui,sans-serif" font-size="11" fill="#6b7280">0%</text><line x1="60" y1="324" x2="630" y2="324" stroke="#e5e7eb" stroke-width="1"/><text x="52" y="328" text-anchor="end" font-family="system-ui,sans-serif" font-size="11" fill="#6b7280">25%</text><line x1="60" y1="242" x2="630" y2="242" stroke="#e5e7eb" stroke-width="1"/><text x="52" y="246" text-anchor="end" font-family="system-ui,sans-serif" font-size="11" fill="#6b7280">50%</text><line x1="60" y1="160" x2="630" y2="160" stroke="#e5e7eb" stroke-width="1"/><text x="52" y="164" text-anchor="end" font-family="system-ui,sans-serif" font-size="11" fill="#6b7280">75%</text><line x1="60" y1="78" x2="630" y2="78" stroke="#e5e7eb" stroke-width="1"/><text x="52" y="82" text-anchor="end" font-family="system-ui,sans-serif" font-size="11" fill="#6b7280">100%</text><text transform="translate(16,242) rotate(-90)" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#111827">gold-hit@3 (localization)</text><rect x="137.5" y="145.8620