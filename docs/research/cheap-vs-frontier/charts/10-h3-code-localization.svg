y="154" font-family="system-ui,sans-serif" font-size="11.5" fill="#6b7280">dense 76%  vs  graph 59%</text><text x="652" y="180" font-family="system-ui,sans-serif" font-size="10.5" fill="#6b7280">Gate ($0): graph TRAVERSED —</text><text x="652" y="193.5" font-family="system-ui,sans-serif" font-size="10.5" fill="#6b7280">graphHits&gt;0 on 5/5 repos (the</text><text x="652" y="207" font-family="system-ui,sans-serif" font-size="10.5" fill="#6b7280">FRAMES structural null did NOT</text><text x="652" y="220.5" font-family="system-ui,sans-serif" font-size="10.5" fill="#6b7280">recur). BUT the "sparse" premise</text><text x="652" y="234" font-family="system-ui,sans-serif" font-size="10.5" fill="#6b7280">was FALSE: code is cosine-DENSE</text><text x="652" y="247.5" font-family="system-ui,sans-serif" font-size="10.5" fill="#6b7280">(median 0.48 &gt; FRAMES 0.434).</text><text x="652" y="261" font-family="system-ui,sans-serif" font-size="10.5" fill="#6b7280"></text><text x="652" y="274.5" font-family="system-ui,sans-serif" font-size="10.5" fill="#6b7280">Paid: pure topology gives NO</text><text x="652" y="288" font-family="system-ui,sans-serif" font-size="10.5" fill="#6b7280">significant localization lift</text><text x="652" y="301.5" font-family="system-ui,sans-serif" font-size="10.5" fill="#6b7280">(Δ −6.9 / +3.4 pp, CIs overlap);</text><text x="652" y="315" font-family="system-ui,sans-serif" font-size="10.5" fill="#6b7280">lower recall + ~14% more tokens</text><text x="652" y="328.5" font-family="system-ui,sans-serif" font-size="10.5" fill="#6b7280">(Cr&lt;0). Not a standalone win.</text></svg>