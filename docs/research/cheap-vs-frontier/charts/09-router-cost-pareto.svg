 stroke-width="1.5"/><line x1="206.04512250022023" y1="31.238836798229045" x2="206.04512250022023" y2="276.8631151586794" stroke="#2563eb" stroke-width="1.3" opacity="0.7"/><circle cx="206.04512250022023" cy="153.0144927536232" r="7" fill="#2563eb" stroke="white" stroke-width="1.5"/><line x1="426.8001693578717" y1="184.13009128852025" x2="426.8001693578717" y2="427.50258430824243" stroke="#a855f7" stroke-width="1.3" opacity="0.7"/><circle cx="435.8001693578717" cy="299.6666666666666" r="7" fill="#a855f7" stroke="white" stroke-width="1.5"/><text x="672" y="76" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#111827">Strategy ($/task · resolve)</text><circle cx="680" cy="94" r="6" fill="#16a34a"/><text x="694" y="98" font-family="system-ui,sans-serif" font-size="11.5" fill="#111827">always-cheap</text><text x="694" y="114" font-family="system-ui,sans-serif" font-size="10.5" fill="#6b7280">$0.0235 · 42.7% · up=0%</text><circle cx="680" cy="134" r="6" fill="#dc2626"/><text x="694" y="138" font-family="system-ui,sans-serif" font-size="11.5" fill="#111827">always-frontier</text><text x="694" y="154" font-family="system-ui,sans-serif" font-size="10.5" fill="#6b7280">$0.1145 · 42.7% · up=100%</text><circle cx="680" cy="174" r="6" fill="#2563eb"/><text x="694" y="178" font-family="system-ui,sans-serif" font-size="11.5" fill="#111827">ORACLE router (perfect)</text><text x="694" y="194" font-family="system-ui,sans-serif" font-size="10.5" fill="#6b7280">$0.0332 · 52.7% · up=10%</text><circle cx="680" cy="214" r="6" fill="#a855f7"/><text x="694" y="218" font-family="system-ui,sans-serif" font-size="11.5" fill="#111827">ruvector router @maxF1</text><text x="694" y="234" font-family="system-ui,sans-serif" font-size="10.5" fill="#6b7280">$0.1145 · 42.7% · up=100%</text><text x="672" y="264" font-family="system-ui,sans-serif" font-size="10.5" fill="#6b7280">Finding: always-cheap already</text><text x="672" y="278" font-family="system-ui,sans-serif" font-size="10.5" fill="#6b7280">matches frontier EM at ~5× lower</text><text x="672" y="292" font-family="system-ui,sans-serif" font-size="10.5" fill="#6b7280">$/task. A PERFECT router adds</text><text x="672" y="306" font-family="system-ui,sans-serif" font-size="10.5" fill="#6b7280">+10pp (union ceiling) — but the</text><text x="672" y="320" font-family="system-ui,sans-serif" font-size="10.5" fill="#6b7280">embedding cannot predict which</text><text x="672" y="334" font-family="system-ui,sans-serif" font-size="10.5" fill="#6b7280">15/150 are "hard" (AUC≈chance),</text><text x="672" y="348" font-family="system-ui,sans-serif" font-size="10.5" fill="#6b7280">so the real router collapses onto</text><text x="672" y="362" font-family="system-ui,sans-serif" font-size="10.5" fill="#6b7280">always-frontier. No Pareto gain.</text></svg>