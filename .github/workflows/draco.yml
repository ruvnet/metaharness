# DRACO deep-research benchmark (ADR-037).
#
# Two jobs:
#   - draco-deterministic (every push + PR): runs the --no-judge DRACO subset
#     OFFLINE (mock transport, zero network, no key) and gates it against the
#     committed mock baseline with bench-baseline.mjs. This catches a
#     regression in the scorer / runner / corpus MACHINERY — not a quality
#     regression (that needs a live run). Deterministic, so it must match the
#     committed baseline-mock.json exactly modulo the 25% threshold.
#   - draco-judged (scheduled cadence only): runs a REAL judged DRACO run
#     against OpenRouter. Gated on OPENROUTER_API_KEY being present (sourced
#     from GCP Secret Manager in CI); SKIPS cleanly when the key is absent so
#     forks / key-less runs don't fail. This is where the real score + the M6
#     fusion ablation will live.

name: draco

on:
  push:
    branches: [main]
    paths:
      - 'packages/bench/**'
      - 'scripts/bench-baseline.mjs'
      - '.github/workflows/draco.yml'
  pull_request:
    paths:
      - 'packages/bench/**'
  workflow_dispatch:
  schedule:
    # Weekly judged cadence — Monday 06:00 UTC.
    - cron: '0 6 * * 1'

permissions:
  contents: read

jobs:
  draco-deterministic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Install + build the bench package
        shell: bash
        run: |
          npm ci || npm install
          npm --workspace @ruflo/bench run build || (cd packages/bench && npm install && npm run build)

      - name: Run the DRACO deterministic subset (offline, mock) + unit tests
        shell: bash
        run: |
          cd packages/bench
          npx vitest run __tests__/draco-corpus.test.ts __tests__/draco-fusion.test.ts __tests__/draco-scorer.test.ts __tests__/draco-judge.test.ts
          node ./dist/draco/draco-bin.js --out=draco-current.json

      - name: Gate the machinery against the committed mock baseline
        shell: bash
        run: |
          node scripts/bench-baseline.mjs \
            --current=packages/bench/draco-current.json \
            --baseline=packages/bench/draco/runs/baseline-mock.json \
            --threshold=25
          # The mock run is deterministic — any drift here means the scorer,
          # runner, or corpus changed without re-baselining. Re-run
          # `npm run bench:draco --out=draco/runs/baseline-mock.json` and commit
          # if the change is intended.

  draco-judged:
    # Real OpenRouter run — only on the scheduled cadence + manual dispatch,
    # never on push (it spends tokens). Skips cleanly without the key.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Check for the OpenRouter key (GCP-secret-sourced in CI)
        id: key
        shell: bash
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          if [ -z "$OPENROUTER_API_KEY" ]; then
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "OPENROUTER_API_KEY absent — skipping the live judged run (this is expected on forks)."
          else
            echo "present=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build + run a REAL judged DRACO run
        if: steps.key.outputs.present == 'true'
        shell: bash
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          cd packages/bench && npm install && npm run build
          TS=$(date +%Y%m%dT%H%M%SZ)
          # A small judged sample to control spend.
          node ./dist/draco/draco-bin.js --live --limit=5 --out=draco/runs/judged-$TS.json
          # The full thesis: vanilla < harness < fusion+harness, with measured deltas.
          node ./dist/draco/draco-bin.js --threeway --live --limit=5 --out=draco/runs/threeway-$TS.json
          echo "Real judged DRACO + three-way ablation complete. transport:live judged:true."
