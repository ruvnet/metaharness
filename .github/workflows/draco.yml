# DRACO deep-research benchmark (ADR-037).
#
# Two jobs:
#   - draco-deterministic (every push + PR): runs the --no-judge DRACO subset
#     OFFLINE (mock transport, zero network, no key) and gates it against the
#     committed mock baseline with bench-baseline.mjs. This catches a
#     regression in the scorer / runner / corpus MACHINERY — not a quality
#     regression (that needs a live run). Deterministic, so it must match the
#     committed baseline-mock.json exactly modulo the 25% threshold.
#   - draco-judged (scheduled cadence only): runs a REAL judged DRACO run
#     against OpenRouter. Gated on OPENROUTER_API_KEY being present (sourced
#     from GCP Secret Manager in CI); SKIPS cleanly when the key is absent so
#     forks / key-less runs don't fail. This is where the real score + the M6
#     fusion ablation will live.

name: draco

on:
  push:
    branches: [main]
    paths:
      - 'packages/bench/**'
      - 'scripts/bench-baseline.mjs'
      - '.github/workflows/draco.yml'
  pull_request:
    paths:
      - 'packages/bench/**'
  workflow_dispatch:
  schedule:
    # Weekly judged cadence — Monday 06:00 UTC.
    - cron: '0 6 * * 1'

permissions:
  contents: read

jobs:
  draco-deterministic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Install + build (root, dependency-ordered — resolves @ruflo/* workspace deps)
        shell: bash
        run: |
          npm ci || npm install
          # The ordered root build compiles kernel → hosts → bench, so
          # host-bench.ts's @ruflo/host-* imports resolve. A bench-only build
          # fails (the @ruflo scope is unpublished — workspace symlinks only
          # exist from the repo root).
          npm run build

      - name: Run the DRACO deterministic subset (offline, mock) + unit tests
        shell: bash
        run: |
          cd packages/bench
          npx vitest run __tests__/draco-corpus.test.ts __tests__/draco-fusion.test.ts __tests__/draco-scorer.test.ts __tests__/draco-judge.test.ts __tests__/draco-ablation.test.ts __tests__/draco-threeway.test.ts
          node ./dist/draco/draco-bin.js --out=draco-current.json

      - name: Gate the machinery against the committed mock baseline
        shell: bash
        run: |
          node scripts/bench-baseline.mjs \
            --current=packages/bench/draco-current.json \
            --baseline=packages/bench/draco/runs/baseline-mock.json \
            --threshold=25
          # The mock run is deterministic — any drift here means the scorer,
          # runner, or corpus changed without re-baselining. Re-run
          # `npm run bench:draco --out=draco/runs/baseline-mock.json` and commit
          # if the change is intended.

  draco-judged:
    # Real OpenRouter run — only on the scheduled cadence + manual dispatch,
    # never on push (it spends tokens). The OPENROUTER_API_KEY is sourced from
    # GCP Secret Manager via Workload Identity Federation — the SAME pattern
    # publish.yml uses for NPM_TOKEN (ADR-018 / iter-145). NO long-lived key in
    # GitHub secrets. Skips cleanly when GCP WIF isn't configured (forks).
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for GCP Workload Identity Federation
    env:
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      GCP_WIF_PROVIDER: ${{ vars.GCP_WIF_PROVIDER }}
      GCP_WIF_SERVICE_ACCOUNT: ${{ vars.GCP_WIF_SERVICE_ACCOUNT }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Is GCP WIF configured? (skip cleanly on forks / no-GCP)
        id: gate
        shell: bash
        run: |
          if [ -z "${GCP_WIF_PROVIDER}" ] || [ -z "${GCP_PROJECT_ID}" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "GCP WIF not configured (no GCP_WIF_PROVIDER / GCP_PROJECT_ID) — skipping the live judged run. Expected on forks."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: GCP Workload Identity Federation
        if: steps.gate.outputs.configured == 'true'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.GCP_WIF_SERVICE_ACCOUNT }}

      - name: Install gcloud SDK
        if: steps.gate.outputs.configured == 'true'
        uses: google-github-actions/setup-gcloud@v2

      - name: Fetch OPENROUTER_API_KEY from GCP Secret Manager
        if: steps.gate.outputs.configured == 'true'
        id: secrets
        uses: google-github-actions/get-secretmanager-secrets@v2
        with:
          secrets: |-
            openrouter_api_key:${{ env.GCP_PROJECT_ID }}/OPENROUTER_API_KEY

      - name: Validate the GCP secret gate (the OpenRouter key resolves)
        if: steps.gate.outputs.configured == 'true'
        shell: bash
        env:
          GCP_PROJECT: ${{ env.GCP_PROJECT_ID }}
          NPM_SECRET_NAME: NPM_TOKEN
          REQUIRED_SECRETS: OPENROUTER_API_KEY
        run: node scripts/validate-gcp-secrets.mjs

      - name: Build + run a REAL judged DRACO run + the three-way ablation
        if: steps.gate.outputs.configured == 'true'
        shell: bash
        env:
          OPENROUTER_API_KEY: ${{ steps.secrets.outputs.openrouter_api_key }}
        run: |
          npm ci || npm install
          npm run build
          TS=$(date +%Y%m%dT%H%M%SZ)
          # A small judged sample to control spend.
          node packages/bench/dist/draco/draco-bin.js --live --limit=5 --out=packages/bench/draco/runs/judged-$TS.json
          # The full thesis: vanilla < harness < fusion+harness, with measured deltas.
          node packages/bench/dist/draco/draco-bin.js --threeway --live --limit=5 --out=packages/bench/draco/runs/threeway-$TS.json
          echo "Real judged DRACO + three-way ablation complete. transport:live judged:true. Key sourced from GCP Secret Manager."
