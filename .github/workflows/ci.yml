name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: cargo fmt
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: cargo test
        run: cargo test --workspace --verbose
      - name: cargo doc
        run: cargo doc --workspace --no-deps
        env:
          RUSTDOCFLAGS: -D warnings

  wasm:
    name: WASM build + validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Install wasm-tools
        run: cargo install wasm-tools --locked
      - name: Build wasm bundler target
        run: wasm-pack build crates/kernel-wasm --target bundler --release
      - name: Validate wasm
        run: wasm-tools validate crates/kernel-wasm/pkg/*.wasm
      - name: Size budget gate (<500 KB hard cap per ADR-002a)
        run: |
          set -euo pipefail
          for f in crates/kernel-wasm/pkg/*.wasm; do
            sz=$(wc -c < "$f")
            echo "wasm: $f size=$sz"
            if [ "$sz" -gt 512000 ]; then
              echo "::error::wasm size $sz exceeds 500 KB hard budget (ADR-002a)"
              exit 1
            fi
          done

  node:
    name: Node ${{ matrix.node }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: [wasm]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: ['20', '22']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: Install
        run: npm ci || npm install
      - name: TypeScript build
        run: npm run build
      - name: TypeScript tests
        run: npm test
