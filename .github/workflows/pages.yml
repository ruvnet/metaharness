# Build, test, and deploy the Agent Harness Generator web UI to GitHub Pages.
# The UI is 100% client-side (no backend), so a static build is all Pages needs.
name: pages

on:
  push:
    branches: [main]
    paths:
      - 'apps/web-ui/**'
      - '.github/workflows/pages.yml'
      # The post-deploy verify job runs this probe — a change to it must
      # re-validate Pages, else a fix to the probe lands but the workflow stays
      # stale-red until an unrelated web-ui push (the c237ddb situation).
      - 'scripts/healthcheck.mjs'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel in-progress runs on new pushes.
concurrency:
  group: pages
  cancel-in-progress: true

defaults:
  run:
    working-directory: apps/web-ui

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web-ui/package-lock.json

      - run: npm ci

      - name: Unit tests (generator core)
        run: npm test

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: E2E (desktop + mobile)
        run: npm run e2e

      - name: Build (base = './' relative — survives repo rename)
        run: npm run build

      # SPA + Pages: 404 falls back to index.html so deep links work.
      - name: SPA fallback
        run: cp dist/index.html dist/404.html

      - name: Disable Jekyll processing
        run: touch dist/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web-ui/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  # iter 78: post-deploy verification. The deploy step above can succeed
  # (status 200 from the Pages API) while the served URL is still serving
  # stale or broken content for a few seconds. This job re-uses iter 72's
  # healthcheck --probe-pages — 2-stage HTTP probe of the live URL +
  # Vite bundle — so a degraded deploy fails LOUDLY on the same run as
  # the deploy itself, not silently until the next manual probe.
  verify:
    needs: deploy
    runs-on: ubuntu-latest
    # Reset working-directory to repo root (we need scripts/, not apps/web-ui/).
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Wait for Pages CDN to settle
        # Pages serves through Fastly; new deploys take a few seconds
        # to propagate. 30s is empirically enough on the agent-harness
        # repo without making the workflow slow.
        run: sleep 30
      - name: Probe the live Studio (2-stage HTTP check)
        run: node scripts/healthcheck.mjs --probe-pages --check=pages
