# iter 84: daily liveness probe of the live Studio at
# https://ruvnet.github.io/metaharness/.
#
# Separate from pages.yml (which fires on push to apps/web-ui/**) so
# the Studio is verified every 24h regardless of whether anyone
# touched the web-UI tree. Catches "deploy worked Monday, CDN went
# weird on Wednesday" failure modes that the iter-78 post-deploy
# verify can't see.
#
# Delegates to the same iter-72 healthcheck --probe-pages probe used
# by preflight (iter 77) and pages.yml verify (iter 78) — one HTTP
# probe implementation in the repo, three callers, per ADR-028.
name: pages-monitor

on:
  schedule:
    # 02:17 UTC daily. Odd-minute offset avoids the cron herd that hits
    # GitHub Actions at HH:00 / HH:15 / HH:30 / HH:45.
    - cron: '17 2 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-monitor
  cancel-in-progress: false

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Probe the live Studio (2-stage HTTP check)
        # Reuses the iter-72 implementation. If the Studio's index 404s
        # or the Vite bundle is broken, this job fails and the workflow
        # status surfaces in the repo's Actions tab.
        run: node scripts/healthcheck.mjs --probe-pages --check=pages
